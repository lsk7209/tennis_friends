name: Content Refresh

on:
  schedule:
    # 매주 월요일 KST 03:00 = UTC 일요일 18:00
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 6개월+ 콘텐츠 리프레시
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/content-refresh.js

      - name: 변경사항 확인
        id: check_changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/app/blog/ src/data/blog-posts.js
          git commit -m "chore(content): refresh stale blog posts [$(date +%Y-%m-%d)]"
          git push

      - name: IndexNow 제출
        if: steps.check_changes.outputs.changed == 'true'
        run: node scripts/submit-indexnow.js
        continue-on-error: true
