name: Auto Content Generation

on:
  schedule:
    # 주 2회(월·목) KST 06:00 = UTC 21:00 (전날). 빌드 비용 절감: 회당 BATCH_POSTS편을
    # 묶어 생성·1회 push → 주 발행량은 유지하면서 Vercel 빌드를 주7→2회로 축소.
    - cron: '0 21 * * 1,4'
  workflow_dispatch:
    inputs:
      force:
        description: '강제 실행 (기존 파일 덮어쓰기 없음)'
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 자동 콘텐츠 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DAILY_AI_BUDGET: '0.5'
          BATCH_POSTS: '7'
        run: node scripts/auto-content.js

      - name: 변경사항 확인
        id: check_changes
        run: |
          if git diff --quiet && git ls-files --others --exclude-standard | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! git diff --quiet; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/app/blog/ src/data/blog-posts.js
          git commit -m "feat(content): auto-generated blog posts [$(date +%Y-%m-%d)]"
          git push

      - name: IndexNow 제출 (Bing·Naver)
        if: steps.check_changes.outputs.changed == 'true'
        run: node scripts/submit-indexnow.js
        continue-on-error: true
